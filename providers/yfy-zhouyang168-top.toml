id = "yfy-zhouyang168-top"

[match]
base_url_hosts = ["yfy.zhouyang168.top"]

[usage]
kind = "budget_info"
refresh_flow = "new_api_subscription_login"
budget_info_auth_source = "usage_token"
candidate_base_sources = ["explicit_usage_base_url", "origin_from_base_url"]
fixed_candidate_bases = []
explicit_endpoint_mode = "none"

[usage.summary_mapping]
usage_kind = "budget_info"
requires_any = ["/expires_at", "/daily_limit", "/weekly_limit", "/monthly_limit"]

[usage.summary_mapping.plan_name]
aliases = ["/plan_name"]

[usage.summary_mapping.remaining]
aliases = ["/remaining"]
transform = "none"

[usage.summary_mapping.daily_used]
aliases = ["/daily_used"]
transform = "none"

[usage.summary_mapping.daily_limit]
aliases = ["/daily_limit"]
transform = "none"

[usage.summary_mapping.weekly_used]
aliases = ["/weekly_used"]
transform = "none"

[usage.summary_mapping.weekly_limit]
aliases = ["/weekly_limit"]
transform = "none"

[usage.summary_mapping.monthly_used]
aliases = ["/monthly_used"]
transform = "none"

[usage.summary_mapping.monthly_limit]
aliases = ["/monthly_limit"]
transform = "none"

[usage.summary_mapping.expires_at_unix_ms]
aliases = ["/expires_at"]

[package_expiry]
strategy = "none"
