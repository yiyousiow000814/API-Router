id = "codex-for-me"

[match]
base_url_host_contains = ["codex-for"]

[usage]
refresh_flow = "login_then_summary"
budget_info_auth_source = "usage_token"
usage_presentation = "total_only"
candidate_base_sources = ["explicit_usage_base_url", "origin_from_base_url"]
fixed_candidate_bases = []
explicit_endpoint_mode = "none"

[usage.summary_mapping]
usage_kind = "balance_info"
requires_any = [
  "/data/card_balance",
  "/data/balance",
  "/data/card_expire_date",
  "/data/card_daily_limit",
  "/data/today_spent_amount",
  "/data/card_total_spent_amount",
]

[usage.summary_mapping.plan_name]
aliases = ["/data/card_name", "/card_name"]

[usage.summary_mapping.remaining]
aliases = []
transform = "none"

[[usage.summary_mapping.remaining.rules]]
pointer = "/data/plan_cards"
item_pointer = "/balance"
aggregate = "sum"
filter_pointer = "/state"
filter_in = ["active"]

[usage.summary_mapping.today_used]
aliases = ["/data/today_spent_amount", "/today_spent_amount"]
transform = "none"

[usage.summary_mapping.daily_used]
aliases = ["/data/today_spent_amount", "/today_spent_amount"]
transform = "none"

[usage.summary_mapping.today_added]
aliases = []
transform = "none"

[[usage.summary_mapping.today_added.rules]]
pointer = "/data/plan_cards"
item_pointer = "/daily_limit"
aggregate = "sum"
filter_pointer = "/state"
filter_in = ["active"]

[[usage.summary_mapping.today_added.rules]]
pointer = "/data/plan_cards"
item_pointer = "/card_daily_limit"
aggregate = "sum"
filter_pointer = "/state"
filter_in = ["active"]

[usage.summary_mapping.daily_limit]
aliases = []
transform = "none"

[[usage.summary_mapping.daily_limit.rules]]
pointer = "/data/plan_cards"
item_pointer = "/daily_limit"
aggregate = "sum"
filter_pointer = "/state"
filter_in = ["active"]

[[usage.summary_mapping.daily_limit.rules]]
pointer = "/data/plan_cards"
item_pointer = "/card_daily_limit"
aggregate = "sum"
filter_pointer = "/state"
filter_in = ["active"]

[usage.summary_mapping.monthly_used]
aliases = []
transform = "none"

[usage.summary_mapping.monthly_limit]
aliases = []
transform = "none"

[usage.summary_mapping.expires_at_unix_ms]
aliases = []

[[usage.summary_mapping.expires_at_unix_ms.rules]]
pointer = "/data/plan_cards"
item_pointer = "/expiration_time"
aggregate = "max"
filter_pointer = "/state"
filter_in = ["active"]

[[usage.summary_mapping.expires_at_unix_ms.rules]]
pointer = "/data/card_expire_date"

[[usage.summary_mapping.expires_at_unix_ms.rules]]
pointer = "/data/expire_date"

[[usage.summary_mapping.expires_at_unix_ms.rules]]
pointer = "/card_expire_date"

[[usage.summary_mapping.expires_at_unix_ms.rules]]
pointer = "/expire_date"

[package_expiry]
strategy = "none"
