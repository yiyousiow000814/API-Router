id = "codex-for-me"

[match]
base_url_host_contains = ["codex-for"]

[usage]
refresh_flow = "login_then_summary"
budget_info_auth_source = "usage_token"
candidate_base_sources = ["explicit_usage_base_url", "origin_from_base_url"]
fixed_candidate_bases = []
explicit_endpoint_mode = "none"

[usage.summary_mapping]
usage_kind = "balance_info"
requires_any = [
  "/data/card_balance",
  "/data/balance",
  "/data/card_expire_date",
  "/data/card_daily_limit",
  "/data/today_spent_amount",
  "/data/card_total_spent_amount",
]

[usage.summary_mapping.plan_name]
aliases = ["/data/card_name", "/card_name"]

[usage.summary_mapping.remaining]
aliases = ["/data/card_balance", "/data/balance", "/card_balance", "/balance"]
transform = "none"

[usage.summary_mapping.daily_used]
aliases = [
  "/data/today_spent_amount",
  "/data/today_total_amount",
  "/data/daily_spent_usd",
  "/today_spent_amount",
  "/today_total_amount",
  "/daily_spent_usd",
]
transform = "none"

[usage.summary_mapping.daily_limit]
aliases = [
  "/data/card_daily_limit",
  "/data/daily_limit",
  "/data/daily_budget_usd",
  "/card_daily_limit",
  "/daily_limit",
  "/daily_budget_usd",
]
transform = "none"

[usage.summary_mapping.monthly_used]
aliases = [
  "/data/card_total_spent_amount",
  "/data/this_month_total_amount",
  "/data/total_spent_amount",
  "/data/monthly_spent_usd",
  "/card_total_spent_amount",
  "/this_month_total_amount",
  "/total_spent_amount",
  "/monthly_spent_usd",
]
transform = "none"

[usage.summary_mapping.expires_at_unix_ms]
aliases = ["/data/card_expire_date", "/data/expire_date", "/card_expire_date", "/expire_date"]

[package_expiry]
strategy = "none"
