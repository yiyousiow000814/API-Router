<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Codex</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-2: rgba(255, 255, 255, 0.96);
      --line: rgba(13, 18, 32, 0.14);
      --line-soft: rgba(13, 18, 32, 0.1);
      --text: #0d1220;
      --muted: rgba(13, 18, 32, 0.64);
      --accent: #28c7d9;
      --accent-2: #f2c14d;
      --danger: #ff3d66;
      --warn: #c48914;
      --radius: 14px;
      --shadow: 0 16px 20px rgba(13, 18, 32, 0.14);
      --thread-card-bg: #ffffff;
      --thread-card-active-bg: #ffffff;
      --thread-group-bg: #ffffff;
      --thread-group-header-bg: #ffffff;
      --scrollbar-size: 8px;
      --scrollbar-thumb: rgba(13, 18, 32, 0.32);
      --scrollbar-thumb-hover: rgba(13, 18, 32, 0.44);

      /* z-index scale (sequential, no gaps). */
      --z-chat-opening: 1;  /* "Opening chat..." overlay inside #chatBox only */
      --z-chat-fab: 2;      /* floating scroll-to-bottom button */
      --z-chat-menu: 3;     /* model menu dropdown */
      --z-chat-submenu: 4;  /* reasoning-effort submenu (fixed overlay) */
      --z-chat-header: 5;   /* chat panel header */
      --z-drawer-backdrop: 6; /* mobile drawer backdrop (must cover header while open) */
      --z-drawer-panel: 7;    /* mobile drawer panel */
      --z-image-viewer: 8;    /* full-screen image viewer */
      --z-folder-picker-backdrop: 9; /* in-app folder picker backdrop */
      --z-folder-picker: 10;         /* in-app folder picker modal */
    }

    /* Keep scrollbar styling consistent across panels (Chromium/WebView2). */
    * {
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }
    *::-webkit-scrollbar { width: var(--scrollbar-size); height: var(--scrollbar-size); }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    *::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

    html, body { height: 100%; min-height: 100vh; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(1100px 680px at 16% -8%, rgba(40, 199, 217, 0.2), transparent 58%),
        radial-gradient(1100px 680px at 94% 0%, rgba(242, 193, 77, 0.2), transparent 60%),
        linear-gradient(180deg, #ffffff, var(--bg));
      color: var(--text);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .shell {
      min-height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr;
      gap: 10px;
      padding: 10px;
    }
    #mainLayout {
      min-height: 0;
      height: 100%;
    }

    .topbar {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(245, 249, 255, 0.92));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px 12px;
      display: none;
      gap: 6px;
    }

    .topbarRow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .topbarRow.actions { justify-content: flex-end; gap: 6px; }
    .topAction {
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 12px;
      border: 1px solid rgba(13, 18, 32, 0.16);
      background: rgba(255, 255, 255, 0.92);
      color: #263247;
      min-height: 32px;
    }
    .mobileNavBtn { display: none; }
    .hamburgerIcon {
      width: 20px;
      height: 20px;
      display: block;
    }
    .hamburgerIcon line {
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      shape-rendering: geometricPrecision;
    }
    .topAction.primary {
      border-color: rgba(40, 199, 217, 0.5);
      background: linear-gradient(135deg, rgba(40, 199, 217, 0.2), rgba(242, 193, 77, 0.2));
      color: #0d1220;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      letter-spacing: .02em;
      margin-right: auto;
    }

    .brandIcon {
      width: 24px;
      height: 24px;
      display: inline-block;
      border: none;
      background: transparent;
    }

    .status {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(40, 199, 217, 0.35);
      color: #0d1220;
      background: rgba(40, 199, 217, 0.12);
      font-size: 12px;
      font-weight: 600;
    }

    .status.warn {
      color: var(--warn);
      border-color: rgba(255, 203, 102, 0.4);
      background: rgba(255, 203, 102, 0.1);
    }

    .layout {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 10px;
    }
    .layout.left-hidden {
      grid-template-columns: minmax(0, 1fr);
    }
    .layout.left-hidden .leftPanel {
      display: none;
    }

    .panel {
      border: none;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .panelHeader {
      padding: 10px;
      border-bottom: none;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .panelTitle {
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-right: auto;
    }
    .chatPanel .panelHeader .workspaceSwitch {
      margin-left: auto;
      margin-right: 0;
    }
    .chatPanel .panelHeader .workspaceBadge {
      margin-left: auto;
      margin-right: 0;
    }
    .chatPanel .panelHeader .panelTitle {
      display: none;
    }
    .chatPanel .panelHeader .headerModelPicker {
      position: relative;
      margin-right: auto;
      min-width: 0;
      display: inline-flex;
      align-items: center;
    }
    .chatPanel .panelHeader .headerModelTrigger {
      -webkit-appearance: none;
      appearance: none;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #0d1220;
      font-size: 16px;
      font-weight: 500;
      /* Avoid descender clipping in some WebViews (e.g. "g" in "Loading"). */
      line-height: 1.15;
      min-width: 0;
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    .chatPanel .panelHeader .headerModelTrigger.disabled {
      opacity: 0.55;
      cursor: default;
    }
    .chatPanel .panelHeader .headerReasoningEffort {
      display: none;
      margin-left: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      font-size: inherit;
      font-weight: inherit;
      color: inherit;
      line-height: inherit;
      transform: none;
      /* Match headerModelText descender padding so effort aligns vertically with the model label. */
      padding-bottom: 1px;
    }
    .chatPanel .panelHeader .headerModelText {
      min-width: 0;
      max-width: min(56vw, 340px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.15;
      /* Some WebViews clip descenders ("g") on flex items with overflow hidden; keep 1px room. */
      padding-bottom: 1px;
      transition: opacity 160ms ease, transform 200ms ease;
      will-change: opacity, transform;
    }
    .chatPanel .panelHeader .headerModelText.isSwapping {
      opacity: 0;
      transform: translate3d(0, -3px, 0);
    }
    .chatPanel .panelHeader .headerReasoningEffort {
      transition: opacity 160ms ease, transform 200ms ease;
      will-change: opacity, transform;
    }
    .chatPanel .panelHeader .headerReasoningEffort.isSwapping {
      opacity: 0;
      transform: translate3d(0, -3px, 0);
    }
    .chatPanel .panelHeader .headerModelChevron {
      width: 14px;
      height: 14px;
      color: #5a6475;
      display: inline-flex;
      opacity: 1;
      transform: translate3d(0, 0, 0);
      transition: opacity 160ms ease, transform 200ms ease;
      will-change: opacity, transform;
    }
    .chatPanel .panelHeader .headerModelPicker.loading .headerModelChevron {
      transition: none;
      opacity: 0;
      transform: translate3d(0, -3px, 0);
      pointer-events: none;
    }
    .chatPanel .panelHeader .headerModelChevron.isSwapping {
      opacity: 0;
      transform: translate3d(0, -3px, 0);
      pointer-events: none;
    }
    .chatPanel .panelHeader .headerModelChevron svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
      transition: transform 150ms ease;
      transform-origin: center center;
    }
    .chatPanel .panelHeader .headerModelPicker.open .headerModelChevron svg {
      transform: rotate(180deg);
    }
    .chatPanel .panelHeader .headerModelMenu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: var(--z-chat-menu);
      min-width: 0;
      width: max-content;
      max-width: min(82vw, 340px);
      max-height: min(56vh, 320px);
      overflow: auto;
      border-radius: 12px;
      border: 1px solid rgba(13, 18, 32, 0.14);
      background: #ffffff;
      box-shadow: none;
      padding: 6px;
      display: grid;
      gap: 2px;
      opacity: 0;
      transform: translate3d(0, -6px, 0);
      transform-origin: top left;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 150ms ease, transform 180ms ease;
      will-change: opacity, transform;
      scrollbar-width: thin;
    }
    .chatPanel .panelHeader .headerModelPicker.open .headerModelMenu {
      opacity: 1;
      transform: translate3d(0, 0, 0);
      pointer-events: auto;
      visibility: visible;
    }
    .chatPanel .panelHeader .headerModelOption {
      border: none;
      background: transparent;
      border-radius: 8px;
      min-height: 30px;
      padding: 6px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #1b2940;
      font-size: 12px;
      text-align: left;
    }
    .chatPanel .panelHeader .headerModelOption:hover {
      background: rgba(13, 18, 32, 0.06);
    }
    .chatPanel .panelHeader .headerModelOption.active {
      background: rgba(40, 199, 217, 0.12);
      color: #0d1220;
      font-weight: 600;
    }
    .chatPanel .panelHeader .headerModelOption .modelLabel {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chatPanel .panelHeader .headerModelOption .modelRight {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
      position: relative;
    }

    .chatPanel .panelHeader .headerModelOption .effortSubChevron {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      cursor: default;
      user-select: none;
      color: rgba(13, 18, 32, 0.6);
    }
    .chatPanel .panelHeader .headerModelOption .effortSubChevron.disabled {
      opacity: 0.35;
      cursor: default;
    }
    .chatPanel .panelHeader .headerModelOption .effortSubChevron:hover {
      background: transparent;
      color: rgba(13, 18, 32, 0.6);
    }
    .chatPanel .panelHeader .headerModelOption .effortSubChevron.disabled:hover {
      background: transparent;
      color: rgba(13, 18, 32, 0.6);
    }
    .chatPanel .panelHeader .headerModelOption .effortSubChevron svg {
      width: 12px;
      height: 12px;
      display: block;
      transform: rotate(-90deg); /* right-facing chevron */
    }
    .chatPanel .panelHeader .headerModelOption .effortSubChevron:focus {
      outline: 2px solid rgba(40, 199, 217, 0.55);
      outline-offset: 1px;
    }
    .chatPanel .panelHeader .headerModelOption .effortSubChevron { outline: none; }

    /* Effort menu is rendered in a fixed overlay (portal) so it can overflow past the model menu scroll clip. */
    .effortInlineOverlay {
      position: fixed;
      z-index: var(--z-chat-submenu);
      min-width: 120px;
      max-width: min(70vw, 220px);
      max-height: min(40vh, 240px);
      overflow: auto;
      border-radius: 12px;
      border: 1px solid rgba(13, 18, 32, 0.14);
      background: #ffffff;
      box-shadow: none;
      padding: 6px;
      gap: 2px;
      /* Keep mounted so opacity/transform transitions can animate (display:none cannot transition). */
      display: grid;
      opacity: 0;
      transform: translate3d(0, 0, 0);
      transform-origin: top left;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 150ms ease;
      will-change: opacity;
      scrollbar-width: thin;
    }
    .effortInlineOverlay.show {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }
    .effortInlineOverlay .effortInlineOption {
      border: none;
      background: transparent;
      border-radius: 8px;
      min-height: 30px;
      padding: 6px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #1b2940;
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      user-select: none;
    }
    .effortInlineOverlay .effortInlineOption:hover {
      background: rgba(13, 18, 32, 0.06);
    }
    .effortInlineOverlay .effortInlineOption.active {
      background: rgba(40, 199, 217, 0.12);
      color: #0d1220;
      font-weight: 600;
    }
    .effortInlineOverlay .effortInlineOption .effortCheck {
      opacity: 0;
      color: #0a7082;
      font-weight: 700;
    }
    .effortInlineOverlay .effortInlineOption.active .effortCheck {
      opacity: 1;
    }

    /* Model menu: keep it clean (no checkmarks). */
    .chatPanel .panelHeader .headerModelOption > .modelRight > .check { display: none; }
    .chatPanel .panelHeader .grow {
      display: none;
    }
    .workspaceSwitch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 6px;
    }
    .workspaceBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 11px;
      line-height: 1;
      min-height: 26px;
      border: 1px solid rgba(13, 18, 32, 0.18);
      background: rgba(255, 255, 255, 0.9);
      color: #47556d;
    }
    .workspaceBtn.active {
      border-color: rgba(40, 199, 217, 0.55);
      background: linear-gradient(135deg, rgba(40, 199, 217, 0.2), rgba(242, 193, 77, 0.2));
      color: #0d1220;
      font-weight: 600;
    }
    .workspaceBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.28);
    }
    .workspaceBadge {
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 10px;
      min-height: 26px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid rgba(13, 18, 32, 0.2);
      color: #47556d;
      background: rgba(255, 255, 255, 0.92);
      user-select: none;
      white-space: nowrap;
    }
    .workspaceBadge.show {
      display: inline-flex;
    }
    .workspaceBadge.is-win {
      border-color: rgba(40, 199, 217, 0.6);
      background: rgba(238, 252, 255, 0.92);
      color: #0a7082;
    }
    .workspaceBadge.is-wsl2 {
      border-color: rgba(182, 139, 86, 0.6);
      background: rgba(255, 246, 234, 0.95);
      color: #8b6433;
    }
    .workspaceBadge.enter {
      animation: workspaceBadgeEnter 180ms cubic-bezier(.22, .61, .36, 1);
    }
    @keyframes workspaceBadgeEnter {
      from { opacity: 0; transform: translateX(10px) scale(0.96); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    .panelBody {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .panelFooter {
      padding: 10px;
      border-top: 1px solid var(--line-soft);
      display: grid;
      gap: 8px;
    }

    .itemList { display: grid; gap: 8px; }
    .itemCard {
      border: 1px solid rgba(13, 18, 32, 0.14);
      background: var(--thread-card-bg);
      border-radius: 12px;
      padding: 8px;
      color: #0d1220;
      text-align: left;
      cursor: pointer;
      width: 100%;
    }
    .groupCard.groupEnter {
      opacity: 0;
      animation: thread-group-enter 240ms cubic-bezier(.22, .61, .36, 1) both;
      animation-delay: var(--thread-group-enter-delay, 0ms);
      will-change: opacity;
    }
    @keyframes thread-group-enter {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .itemCard.threadEnter {
      opacity: 0;
      transform: translate3d(0, 18px, 0);
      animation: thread-card-enter 360ms cubic-bezier(.22, .61, .36, 1) both;
      animation-delay: var(--thread-enter-delay, 0ms);
      will-change: opacity, transform;
    }
    .groupHeader.threadHeaderEnter {
      opacity: 0;
      transform: translate3d(0, 18px, 0);
      animation: thread-header-enter 360ms cubic-bezier(.22, .61, .36, 1) both;
      animation-delay: var(--thread-group-enter-delay, 0ms);
      will-change: opacity, transform;
    }
    body.drawer-left-opening .groupCard.groupEnter,
    body.drawer-left-opening .groupHeader.threadHeaderEnter,
    body.drawer-left-opening .itemCard.threadEnter {
      animation-play-state: paused;
    }
    @keyframes thread-card-enter {
      from { opacity: 0; transform: translate3d(0, 18px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }
    @keyframes thread-header-enter {
      from { opacity: 0; transform: translate3d(0, 18px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }
    .threadListState {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #637188;
      padding: 8px 4px;
    }
    .threadListStateText,
    .threadListPlainState {
      display: inline-block;
    }
    .threadListStateText.is-text-swap,
    .threadListPlainState.is-text-swap {
      animation: thread-list-state-text-swap 180ms ease both;
    }
    @keyframes thread-list-state-text-swap {
      from { opacity: 0.42; transform: translate3d(0, 2px, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }
    .threadListStateSpinner {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 2px solid rgba(99, 113, 136, 0.25);
      border-top-color: #637188;
      animation: thread-list-spin 0.8s linear infinite;
      flex: 0 0 auto;
    }
    @keyframes thread-list-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .itemCard:hover { border-color: #434a58; }
    .itemCard.active {
      border-color: rgba(40, 199, 217, 0.55);
      background: var(--thread-card-active-bg);
    }
    .threadFavBtn {
      border: none;
      background: transparent;
      color: #637188;
      width: auto;
      height: auto;
      flex: 0 0 auto;
      border-radius: 0;
      font-size: 12px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      margin-right: 0;
    }
    .threadFavBtn .starGlyph {
      display: block;
      transform: translateY(-1px);
    }
    .threadFavBtn.active {
      color: #b07a00;
    }
    .itemTitle { font-weight: 500; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .itemSub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .groupCard {
      border: 1px solid rgba(13, 18, 32, 0.14);
      border-radius: 12px;
      overflow: hidden;
      background: var(--thread-group-bg);
    }
    .groupHeader {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      border: none;
      border-bottom: 1px solid rgba(13, 18, 32, 0.1);
      border-radius: 0;
      padding: 8px 10px;
      text-align: left;
      background: var(--thread-group-header-bg);
    }
    .groupHeader.is-collapsed {
      border-bottom-color: transparent;
    }
    .groupChevron {
      margin-left: auto;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform-origin: 50% 50%;
      transform: rotate(90deg);
      color: #637188;
    }
    .groupChevron.is-collapsed {
      transform: rotate(0deg);
    }
    .groupChevronIcon {
      width: 14px;
      height: 14px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .groupChevron.anim-open {
      animation: chevron-open 0.16s ease;
    }
    .groupChevron.anim-close {
      animation: chevron-close 0.16s ease;
    }
    @keyframes chevron-open {
      from { transform: rotate(0deg); }
      to { transform: rotate(90deg); }
    }
    @keyframes chevron-close {
      from { transform: rotate(90deg); }
      to { transform: rotate(0deg); }
    }
    .groupBody {
      display: grid;
      gap: 6px;
      padding: 8px;
      /* Keep scroll inside the expanded group (matches original Web Codex behavior). */
      max-height: 46vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      /* Avoid 1-2px jiggle when scrollbars appear/disappear as content loads/filters. */
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(13, 18, 32, 0.35) transparent;
    }

        transition: transform 180ms ease;
        border-color: #32405b;
      }
      .leftPanel {
        left: 10px;
        transform: translateX(-108%);
        background: #ffffff;
        border-color: rgba(13, 18, 32, 0.14);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .leftPanel .panelHeader {
        display: none;
      }
      .leftPanel .panelBody {
        padding-bottom: 0;
      }
      .leftPanel .panelFooter {
        padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      }
      .leftPanel .panelFooter .drawerSettingsBtn {
        pointer-events: auto;
      }
      .leftPanel .panelFooter .muted,
      .leftPanel .panelFooter #activeThreadId {
        display: none;
      }
      .leftPanel input,
      .leftPanel textarea,
      .leftPanel select {
        background: rgba(255, 255, 255, 0.92);
        border-color: rgba(13, 18, 32, 0.16);
        color: #0d1220;
      }
      .leftPanel input:focus,
      .leftPanel textarea:focus,
      .leftPanel select:focus {
        border-color: #434a58;
        box-shadow: 0 0 0 2px rgba(148, 157, 173, 0.12);
      }
      .leftPanel .drawerSectionTitle,
      .leftPanel .sectionTitle {
        color: #637188;
      }
      .leftPanel .itemTitle,
      .leftPanel .drawerLabel {
        color: #0d1220;
      }
      .leftPanel .itemSub,
      .leftPanel .drawerHint {
        color: #637188;
      }
      .leftPanel .threadFavBtn {
        color: #637188;
      }
      .leftPanel .threadFavBtn.active {
        color: #b07a00;
      }
      .rightPanel {
        right: 10px;
        transform: translateX(108%);
      }
      body.drawer-left-open .leftPanel {
        transform: translateX(0);
        box-shadow: 0 24px 20px rgba(0, 0, 0, 0.35);
      }
      body.drawer-right-open .rightPanel {
        transform: translateX(0);
        box-shadow: 0 24px 20px rgba(0, 0, 0, 0.35);
      }
      .msg {
        padding-left: 4px;
        padding-right: 4px;
      }
      .msg.user {
        max-width: 92%;
        padding: 6px 9px;
      }
    }

    @media (max-width: 1080px) and (max-height: 600px) {
      .messages {
        padding-top: 6px;
        padding-bottom: 6px;
      }
      .welcomeCard {
        margin-top: clamp(6px, 3vh, 20px);
        gap: 8px;
      }
      .welcomeBrand {
        gap: 4px;
        margin-bottom: 2px;
      }
      .welcomeLogo {
        width: 44px;
        height: 44px;
      }
      .welcomeTitle {
        font-size: 24px;
      }
      .welcomePrompts {
        gap: 8px;
      }
      .welcomePrompt {
        min-height: 58px;
        padding: 10px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar">
      <div class="topbarRow">
        <div class="brand"><img class="brandIcon" src="/codex-web/codex-icon.svg" alt="Codex" /> Web Codex</div>
        <span id="statusBadge" class="status warn">Disconnected</span>
        <span id="sandboxBadge" class="status warn" style="display:none;">Sandbox (Read-only)</span>
      </div>
      <div class="topbarRow">
        <button id="openThreadsBtn" class="topAction">Chats</button>
        <button id="openToolsBtn" class="topAction">Tools</button>
        <button id="connectBtn" class="topAction primary">Connect</button>
        <button id="refreshAllBtn" class="topAction">Refresh</button>
      </div>
      <div id="statusLine" class="muted">Ready.</div>
    </section>

    <main id="mainLayout" class="layout">
      <section class="panel leftPanel">
        <div class="panelBody drawerBody">
          <div class="drawerBrandRow">
            <span class="drawerBrandMain"><img class="drawerBrandLogo" src="/ao-icon.png" alt="API Router logo" /><span>API Router</span></span>
            <div id="drawerWorkspaceSwitch" class="drawerWorkspaceSwitch">
              <button id="drawerWorkspaceWindowsBtn" class="workspaceBtn">WIN</button>
              <button id="drawerWorkspaceWslBtn" class="workspaceBtn">WSL2</button>
            </div>
          </div>
          <button id="leftNewChatBtn" class="drawerNewBtn"><span class="plus">+</span>New chat</button>
          <div class="drawerSectionTitle">Start Directory</div>
          <button id="leftStartDirBtn" class="drawerItemBtn">
            <span class="drawerLabel">
              <span class="drawerInlineIcon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M3 6.8a1.8 1.8 0 0 1 1.8-1.8h4.3l1.6 2h8.5A1.8 1.8 0 0 1 21 8.8v8.4a1.8 1.8 0 0 1-1.8 1.8H4.8A1.8 1.8 0 0 1 3 17.2z"></path>
                </svg>
              </span>
              <span id="drawerWorkspaceText">Select folder</span>
            </span>
          </button>
          <div class="drawerSectionTitle">Chats</div>
          <input id="threadSearchInput" class="mono" placeholder="Search chats" />
          <div id="threadPullHint" class="threadPullHint" aria-live="polite">
            <span class="threadPullHintInner">
              <span class="threadPullSpinner" aria-hidden="true"></span>
              <span id="threadPullHintText" class="threadPullText"></span>
            </span>
          </div>
          <div id="threadList" class="itemList">
            <div class="threadListState">
              <span class="threadListStateSpinner" aria-hidden="true"></span>
              <span>Waiting for chats...</span>
            </div>
          </div>
        </div>
        <div class="panelFooter">
          <button id="leftSettingsBtn" class="drawerSettingsBtn">
            <span class="settingsIcon" aria-hidden="true">
              <svg viewBox="0 0 16 16">
                <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492a3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0a2.246 2.246 0 0 1-4.492 0"></path>
                <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"></path>
              </svg>
            </span>
            <span class="drawerLabel">Settings</span>
          </button>
        </div>
      </section>

      <section class="panel chatPanel">
        <div class="panelHeader">
          <button id="mobileMenuBtn" class="topAction mobileNavBtn" aria-label="Open sidebar">
            <svg class="hamburgerIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <line x1="4" y1="7" x2="20" y2="7"></line>
              <line x1="4" y1="12" x2="20" y2="12"></line>
              <line x1="4" y1="17" x2="20" y2="17"></line>
            </svg>
          </button>
          <div class="panelTitle">New chat</div>
          <div id="headerModelPicker" class="headerModelPicker">
            <button id="headerModelTrigger" class="headerModelTrigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span id="headerModelLabel" class="headerModelText">Loading models...</span>
              <span id="headerReasoningEffort" class="headerReasoningEffort"></span>
              <span class="headerModelChevron" aria-hidden="true">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path d="M4.5 6.2l3.5 3.6 3.5-3.6"></path>
                </svg>
              </span>
            </button>
            <div id="headerModelMenu" class="headerModelMenu" role="listbox" aria-label="Model options"></div>
          </div>
          <div id="headerWorkspaceSwitch" class="workspaceSwitch">
            <button id="workspaceWindowsBtn" class="workspaceBtn">WIN</button>
            <button id="workspaceWslBtn" class="workspaceBtn">WSL2</button>
          </div>
          <div id="headerWorkspaceBadge" class="workspaceBadge" aria-live="polite"></div>
          <div class="grow"></div>
        </div>
        <button id="scrollToBottomBtn" class="scrollToBottomBtn" type="button" aria-label="Scroll to bottom" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v12"></path><path d="M7.5 13.5L12 18l4.5-4.5"></path></svg>
        </button>
        <div id="settingsTab" class="settingsTab">
          <div class="settingsCard">
            <div id="settingsInfoSection">
              <div class="drawerSectionTitle" style="margin-top:0;">Environment</div>
              <div class="settingsRow">
                <div class="muted">Codex Version (Windows)</div>
                <div id="windowsCodexVersion" class="mono">Detecting...</div>
              </div>
              <div class="settingsRow">
                <div class="muted">Codex Version (WSL2)</div>
                <div id="wslCodexVersion" class="mono">Detecting...</div>
              </div>
              <div class="drawerSectionTitle" style="margin-top:14px;">Alerts</div>
              <div class="row wrap settingsActions">
                <button id="enableNotifBtn">Enable notifications</button>
                <span id="notifState" class="muted">Notification: off</span>
              </div>
            </div>
          </div>
        </div>
        <div id="chatBox" class="messages">
          <div id="welcomeCard" class="welcomeCard">
            <div class="welcomeBrand">
              <img class="welcomeLogo" src="/codex-web/codex-icon.svg" alt="Codex" />
              <div class="welcomeTitle">Codex</div>
            </div>
            <button id="welcomeWorkspaceBtn" class="welcomeSetting">
              <span id="welcomeWorkspaceText">Select folder</span>
              <span class="welcomeChevron" aria-hidden="true">
                <svg class="groupChevronIcon" viewBox="0 0 16 16" focusable="false"><path d="M6 4l4 4-4 4"></path></svg>
              </span>
            </button>
            <div class="welcomePrompts">
              <button id="quickPrompt1" class="welcomePrompt">Explain the current codebase structure</button>
              <button id="quickPrompt2" class="welcomePrompt">Write tests for the main module</button>
            </div>
          </div>
          <div id="chatOpeningOverlay" class="chatOpeningOverlay" aria-live="polite">
            <div class="chatOpeningSpinner" aria-hidden="true"></div>
            <div>Opening chat...</div>
          </div>
        </div>
        <div class="composer">
          <div id="attachmentPills" class="pillRow"></div>
          <input id="attachInput" type="file" style="display:none;" />
          <div class="mobileComposerRow">
            <button id="mobileAttachBtn" class="mobileCircleBtn"><span class="mobileAttachGlyph">+</span></button>
            <div id="mobilePromptWrap" class="mobilePromptWrap">
              <textarea id="mobilePromptInput" class="mobilePromptInput" rows="1" placeholder="Message Codex..."></textarea>
              <button id="mobileSendBtn" class="mobileCircleBtn mobileSendBtn" aria-label="Send message">
                <svg class="sendArrowIcon" viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                  <path d="M10 15V5m0 0-4 4m4-4 4 4"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="mobileComposerMetaRow">
            <div id="mobileContextLeft" class="mobileContextLeft" data-qa="mobile-context-left" aria-live="polite">100% context left</div>
          </div>
        </div>
      </section>

      <input id="tokenInput" type="hidden" />
    </main>
  </div>
  <div id="mobileDrawerBackdrop" class="drawerBackdrop"></div>
  <div id="folderPickerBackdrop" class="folderPickerBackdrop" aria-hidden="true">
    <div class="folderPickerModal" role="dialog" aria-modal="true" aria-label="Select folder">
      <div class="folderPickerHeader">
        <div class="folderPickerTitle">Select folder</div>
        <button id="folderPickerCloseBtn" class="folderPickerCloseBtn">Close</button>
      </div>
      <div class="folderPickerWorkspaceSwitch">
        <button id="folderPickerWorkspaceWindowsBtn" class="workspaceBtn">WIN</button>
        <button id="folderPickerWorkspaceWslBtn" class="workspaceBtn">WSL2</button>
      </div>
      <div class="folderPickerPathRow">
        <div id="folderPickerCurrentPath" class="folderPickerPath">Select a folder</div>
        <button id="folderPickerUpBtn" class="folderPickerUpBtn">Up</button>
      </div>
      <div id="folderPickerError" class="folderPickerError" aria-live="polite"></div>
      <div id="folderPickerList" class="folderPickerList"></div>
      <div class="folderPickerActions">
        <button id="folderPickerUseDefaultBtn" class="folderPickerActionBtn">Use default</button>
        <button id="folderPickerUseCurrentBtn" class="folderPickerActionBtn primary">Use this folder</button>
      </div>
    </div>
  </div>
  <script>window.__WEB_CODEX_EMBEDDED_TOKEN__ = "__WEB_CODEX_EMBEDDED_TOKEN__";</script>
  <script src="/codex-web/app.js"></script>
</body>
</html>
